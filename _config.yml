# Setup
title: byt3loss
description: Offensive Code & Pizza 🍕
url: https://vszhub.github.io
avatar: /avatar.png
paginate: 5
permalink: pretty
cover_image: /bg.jpg
favicon: /avatar.png

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: vszhub
  card: summary
logo: logo.png
social:
  name: Songzi Vong
  links:
    - https://github.com/byt3loss
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

goat_counter: https://t.byteloss.dev/count

# Specify the author for blog posts
author:
  name: Fabio
  url: https://github.com/byt3loss/
  email: fabio@byteloss.dev
